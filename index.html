<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fish Hoek Lions Club — Treasury Book</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --ink:#132A46; --ink-soft:#3D5470;
    --navy:#1B3A63; --navy-deep:#0F2340;
    --gold:#C89A3E; --gold-soft:#E7D4A3;
    --paper:#F6F2E7; --paper-line:#E6DFC9;
    --card:#FFFDF8; --card-border:#E3DCC8;
    --income:#2F6F4F; --income-bg:#E7F0E8;
    --expense:#9C3D3D; --expense-bg:#F5E7E4;
    --shadow: 0 1px 2px rgba(19,42,70,0.06), 0 8px 24px -12px rgba(19,42,70,0.18);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    background-image:
      radial-gradient(circle at 100% 0%, rgba(200,154,62,0.08), transparent 40%),
      repeating-linear-gradient( to bottom, transparent 0px, transparent 27px, var(--paper-line) 28px );
    color:var(--ink); font-family:'Inter', sans-serif; min-height:100vh;
  }
  .num{ font-family:'IBM Plex Mono', monospace; font-variant-numeric: tabular-nums; }
  h1,h2,h3,.display{ font-family:'Fraunces', serif; }
  .app{ display:flex; min-height:100vh; max-width:1320px; margin:0 auto; }

  .sidebar{
    width:220px; flex-shrink:0;
    background:linear-gradient(180deg,var(--navy-deep),var(--navy) 60%);
    color:#EFE7D2; padding:28px 18px; display:flex; flex-direction:column; gap:28px;
    position:sticky; top:0; height:100vh;
  }
  .crest{
    width:56px;height:56px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--gold-soft), var(--gold) 60%, #9c7a2c 100%);
    display:flex;align-items:center;justify-content:center;
    color:var(--navy-deep); font-family:'Fraunces',serif; font-weight:700; font-size:18px;
    box-shadow: inset 0 0 0 2px rgba(255,255,255,0.35), 0 4px 10px rgba(0,0,0,0.35);
  }
  .brand-name{ font-family:'Fraunces',serif; font-size:16px; line-height:1.25; font-weight:600; color:#FBF6E9;}
  .brand-sub{ font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--gold-soft); margin-top:4px;}
  nav{ display:flex; flex-direction:column; gap:4px; margin-top:6px; }
  .nav-btn{ all:unset; cursor:pointer; padding:10px 12px; border-radius:8px; font-size:13.5px; color:#D9D0B8; display:flex; align-items:center; gap:10px; transition:background .15s, color .15s;}
  .nav-btn:hover{ background:rgba(255,255,255,0.06); color:#fff; }
  .nav-btn.active{ background:rgba(200,154,62,0.18); color:#fff; box-shadow:inset 3px 0 0 var(--gold); }
  .nav-ico{ width:16px; text-align:center; opacity:.85; }
  .sidebar-footer{ margin-top:auto; font-size:11px; color:#9DAAC0; line-height:1.5; }

  main{ flex:1; padding:32px 40px 60px; min-width:0; }
  .page-head{ display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:24px; flex-wrap:wrap; gap:12px;}
  .page-head h1{ font-size:26px; margin:0 0 4px; color:var(--ink); }
  .page-head p{ margin:0; color:var(--ink-soft); font-size:13.5px; }
  .fy-pill{ font-size:12px; background:var(--card); border:1px solid var(--card-border); padding:6px 12px; border-radius:20px; color:var(--ink-soft); box-shadow:var(--shadow);}

  .card{ background:var(--card); border:1px solid var(--card-border); border-radius:12px; box-shadow:var(--shadow); padding:20px; }
  .grid{ display:grid; gap:16px; }
  .kpi-grid{ grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); margin-bottom:22px; }
  .kpi{ position:relative; overflow:hidden; }
  .kpi::before{ content:""; position:absolute; top:0; left:0; width:4px; height:100%; background:var(--gold); }
  .kpi-label{ font-size:11.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); margin-bottom:8px;}
  .kpi-val{ font-size:24px; font-weight:600; }
  .kpi-sub{ font-size:12px; color:var(--ink-soft); margin-top:4px; }
  .pos{ color:var(--income); } .neg{ color:var(--expense); }

  .section-title{ font-size:15px; font-weight:600; margin:0 0 12px; display:flex; align-items:center; gap:8px; }
  .section-title .rule{ flex:1; height:1px; background:var(--card-border); }
  .section-sub{ font-size:12.5px; color:var(--ink-soft); margin:-8px 0 14px; }

  table{ width:100%; border-collapse:collapse; font-size:13px; }
  th{ text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-soft); padding:8px 10px; border-bottom:1px solid var(--card-border); }
  td{ padding:9px 10px; border-bottom:1px solid #EFE9D8; vertical-align:middle; }
  tr:last-child td{ border-bottom:none; }
  tbody tr:hover{ background:rgba(200,154,62,0.06); }
  .right{ text-align:right; }
  .muted{ color:var(--ink-soft); }
  .tag{ font-size:11px; padding:2px 8px; border-radius:12px; background:#EEE7D3; color:var(--ink-soft); }
  .tag.admin{ background:#DCE6F0; color:#1B3A63; }
  .tag.projects{ background:#EADFF0; color:#4B2E73; }
  .tag.closed{ background:#EFE9D8; color:var(--ink-soft); }

  .chip-wrap{ display:flex; flex-wrap:wrap; gap:8px; }

  .sig-block{ display:flex; gap:36px; margin-top:32px; padding-top:20px; border-top:1px solid var(--card-border); flex-wrap:wrap; }
  .sig-col{ flex:1; min-width:150px; }
  .sig-image{ height:44px; display:flex; align-items:flex-end; }
  .sig-image img{ max-height:44px; max-width:170px; object-fit:contain; }
  .sig-line{ border-bottom:1px solid var(--ink); margin-top:4px; margin-bottom:6px; }
  .sig-name{ font-size:12.5px; font-weight:600; min-height:16px; }
  .sig-title{ font-size:10.5px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.05em; }
  .chip{ display:inline-flex; align-items:center; gap:8px; background:#F1EAD6; border:1px solid var(--card-border); border-radius:20px; padding:6px 8px 6px 14px; font-size:12.5px; color:var(--ink); }
  .chip button{ all:unset; cursor:pointer; width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--ink-soft); font-size:13px; line-height:1; }
  .chip button:hover{ background:rgba(156,61,61,0.15); color:var(--expense); }

  .form-grid{ display:grid; grid-template-columns:repeat(6,1fr); gap:12px; align-items:end; }
  .field label{ display:block; font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-soft); margin-bottom:5px;}
  input,select{ width:100%; padding:9px 10px; border:1px solid var(--card-border); border-radius:7px; background:#FFFFFF; font-family:'Inter',sans-serif; font-size:13.5px; color:var(--ink);}
  input:focus,select:focus{ outline:none; border-color:var(--gold); box-shadow:0 0 0 3px rgba(200,154,62,0.18); }
  .btn{ all:unset; cursor:pointer; padding:10px 16px; border-radius:7px; font-size:13.5px; font-weight:600; background:var(--navy); color:#fff; text-align:center; transition:background .15s, transform .05s; white-space:nowrap;}
  .btn:hover{ background:var(--navy-deep); }
  .btn:active{ transform:translateY(1px); }
  .btn.ghost{ background:transparent; color:var(--navy); border:1px solid var(--card-border); }
  .btn.ghost:hover{ background:#EFE9D8; }
  .btn.danger{ background:var(--expense); }
  .btn.confirming{ background:var(--expense) !important; color:#fff !important; border-color:var(--expense) !important; }
  .btn.danger:hover{ background:#7d2f2f; }
  .btn.small{ padding:5px 10px; font-size:12px; }
  .toggle-group{ display:flex; border:1px solid var(--card-border); border-radius:7px; overflow:hidden; }
  .toggle-group button{ all:unset; flex:1; text-align:center; padding:9px 0; font-size:13px; cursor:pointer; color:var(--ink-soft); }
  .toggle-group button.on.admin{ background:#DCE6F0; color:#1B3A63; font-weight:600; }
  .toggle-group button.on.projects{ background:#EADFF0; color:#4B2E73; font-weight:600; }
  .toggle-group button.on.income{ background:var(--income-bg); color:var(--income); font-weight:600; }
  .toggle-group button.on.expense{ background:var(--expense-bg); color:var(--expense); font-weight:600; }

  .filters{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px; align-items:center; }
  .filters select, .filters input{ width:auto; min-width:140px; }

  .empty{ text-align:center; padding:40px 20px; color:var(--ink-soft); font-size:13.5px; }
  .empty .big{ font-family:'Fraunces',serif; font-size:16px; color:var(--ink); margin-bottom:6px; }

  .statement{ display:grid; grid-template-columns:1fr 1fr; gap:24px; }
  .statement-col h3{ font-size:13px; text-transform:uppercase; letter-spacing:.05em; margin:0 0 10px; color:var(--ink-soft); }
  .statement-row{ display:flex; justify-content:space-between; padding:6px 2px; font-size:13px; border-bottom:1px dashed #E6DFC9; }
  .statement-row.total{ font-weight:700; border-bottom:none; border-top:2px solid var(--ink); margin-top:4px; padding-top:8px; }
  .statement-row .amt.zero{ color:#C9C2AD; }

  .statement-table{ width:100%; border-collapse:collapse; font-size:13px; }
  .statement-table th{ text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-soft); padding:8px 10px; border-bottom:2px solid var(--ink); }
  .statement-table td{ padding:6px 10px; border-bottom:1px dashed #E6DFC9; }
  .statement-table td.zero{ color:#C9C2AD; }
  .statement-table .col-divider{ border-left:1px solid var(--card-border); }
  .statement-table tr:last-child td{ border-bottom:none; }
  .statement-table .total-row td{ font-weight:700; border-bottom:none; border-top:2px solid var(--ink); padding-top:9px; }

  .balance-strip{ display:flex; gap:16px; margin-top:18px; flex-wrap:wrap; }
  .balance-box{ flex:1; min-width:200px; padding:14px 16px; border-radius:10px; background:linear-gradient(135deg,#F1EAD6,#F7F3E6); border:1px solid var(--card-border);}
  .balance-box .label{ font-size:11px; text-transform:uppercase; color:var(--ink-soft); letter-spacing:.05em;}
  .balance-box .val{ font-size:20px; font-weight:700; margin-top:4px;}

  .bar-row{ display:flex; align-items:center; gap:10px; margin-bottom:9px; }
  .bar-label{ width:150px; font-size:12.5px; color:var(--ink-soft); flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .bar-track{ flex:1; height:8px; background:#EFE9D8; border-radius:4px; overflow:hidden; }
  .bar-fill{ height:100%; background:linear-gradient(90deg,var(--gold),#B98A2E); border-radius:4px; }
  .bar-val{ width:80px; text-align:right; font-size:12.5px; }

  .toast{ position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--navy-deep); color:#fff; padding:10px 18px; border-radius:8px; font-size:13px; box-shadow:var(--shadow); opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; z-index:50;}
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(-4px); }
  .loading-wrap{ display:flex; align-items:center; justify-content:center; height:60vh; color:var(--ink-soft); font-size:13.5px;}

  .confirm-box{ background:var(--expense-bg); border:1px solid #E0BEBE; border-radius:8px; padding:14px 16px; margin-top:12px; font-size:13px; color:#6b2c2c; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;}
  .confirm-box .actions{ display:flex; gap:8px; }

  .member-row{ cursor:pointer; }
  .member-detail{ background:#FBF8F0; }
  .member-detail-inner{ padding:14px 18px 18px; display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  .history-list{ font-size:12.5px; max-height:160px; overflow:auto; }
  .history-item{ display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px dashed #E6DFC9; }
  .mini-form{ display:flex; gap:8px; margin-top:10px; }
  .mini-form input{ font-size:12.5px; padding:7px 8px; }

  .closed-badge{ display:inline-flex; align-items:center; gap:5px; font-size:11px; color:var(--ink-soft); }

  .print-only{ display:none; }
  .print-header{ font-size:11.5px; color:#333; border-bottom:1px solid #999; padding-bottom:8px; margin-bottom:16px; }

  @media print {
    body{ background:#fff !important; }
    .sidebar, .toast, .confirm-box, .no-print{ display:none !important; }
    button, input, select{ display:none !important; }
    .print-only{ display:block !important; }
    .app{ display:block; max-width:100%; }
    main{ padding:0; }
    .card{ box-shadow:none; border:1px solid #ccc; break-inside:avoid; margin-bottom:14px; background:#fff; }
    .report-card{ break-inside:auto; }
    table tr{ break-inside:avoid; }
    .page-head{ margin-bottom:10px; }
    .fy-pill{ box-shadow:none; }
    table{ font-size:11.5px; }
  }

  @media (max-width: 880px){
    .app{ flex-direction:column; }
    .sidebar{ position:relative; height:auto; width:100%; flex-direction:row; align-items:center; padding:16px; }
    .sidebar-footer{ display:none; }
    nav{ flex-direction:row; flex-wrap:wrap; margin-top:0; }
    main{ padding:20px; }
    .form-grid{ grid-template-columns:1fr 1fr; }
    .statement{ grid-template-columns:1fr; }
    .member-detail-inner{ grid-template-columns:1fr; }
  }
</style>
</head>
<body>
<div class="app" id="app"><div class="loading-wrap">Opening the ledger…</div></div>
<div class="toast" id="toast"></div>

<script>
/* ---------------------------------------------------------
   Fish Hoek Lions Club — Treasury Book
---------------------------------------------------------- */

const DEFAULT_CATEGORIES = [
  "Int. Dues","Member Dues","Fund Raiser","Donation","Awards","Memerabilia",
  "Service Project","Account Correction","Meeting","Christmas Cakes","LCIF",
  "Travel","Tail Twister","Bank Charges & Service Fees","MD Dues","Disaster Relief",
  "District","Zone","Leos Project","Leos Donation/Fundraiser","Leos Admin",
  "District Dues","Induction","Club Development","Claim against Dues",
  "Amazon Donation","Amazon Projects","Pancakes","FUNDS UNKNOWN"
];

const MEMBERSHIP_RATES = {
  "Full members": 195,
  "Full members (pensioners)": 97.5,
  "Family members": 97.5,
  "Leo-Lion": 97.5
};

const MEMBER_NAMES = [
  ["Mandy Proctor","Family members"],["Annette Bothma","Full members"],["Ewen Smith","Full members"],
  ["Liz Coetzee","Full members"],["Lorna van Romburgh","Full members"],["Brent Proctor","Full members"],
  ["Patrick Msakayeya","Full members"],["Rose Lewis","Full members"],["Tania Lindique","Full members"],
  ["Yolande Magerman","Full members"],["Zeta Booysen","Full members"],["Jayshree Rajpaul","Full members"],
  ["Lauren Winder","Full members"],["Margaret Van Der Merwe","Full members"],["Rory Stier","Family members"],
  ["Lynn Strydom","Full members"],["Kirsten Strydom","Family members"],["Rodney Layters","Full members"],
  ["Lucinda Price","Full members"],["Denise","Full members"],["Jenny Rogers","Family members"],
  ["Andrew Rogers","Full members"]
];

const STORAGE_KEY = "lions-treasury-state-v2";

/* ---------- Supabase (optional) ----------
   Fill these in with your project's URL and anon public key
   (Supabase dashboard → Settings → API) to save data to Supabase
   instead of Claude's built-in artifact storage. Leave them as-is
   to keep using this app inside Claude.ai.
------------------------------------------- */
const SUPABASE_URL = "https://phkqvjxrcikkvbofilgr.supabase.co".trim();
const SUPABASE_ANON_KEY = "sb_publishable_7QHxFMUfu40E8pmZM9SHnw__qeTwevj".trim();
const useSupabase = SUPABASE_URL.startsWith("http") && !!window.supabase;
let sb = null;
if(useSupabase){
  try{ sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); }
  catch(e){ console.error("Supabase client failed to initialise:", e); sb = null; }
}

function defaultFY(){
  // default to 1 July this-or-last year -> 30 June next year
  const now = new Date();
  const y = now.getMonth() >= 6 ? now.getFullYear() : now.getFullYear()-1;
  return { startDate: `${y}-07-01`, endDate: `${y+1}-06-30` };
}

let authSession = null;
let state = {
  club: { name: "Fish Hoek Lions Club", logo: null, bankDetailsAdmin: "", bankDetailsProjects: "", treasurerName: "", treasurerEmail: "",
    address: "", phone: "", email: "", presidentName: "", presidentSignature: null, treasurerSignature: null },
  fiscalYear: defaultFY(),
  openingBalances: { Admin: 8850.92, Projects: 88744.04 },
  transactions: [],
  categories: [...DEFAULT_CATEGORIES],
  dues: MEMBER_NAMES.map(([name,type],i)=>({ id:"d"+i, name, type, owing:0, history:[] })),
  closedYears: [],
  donorDocuments: [],
  tab: "dashboard",
  ui: {}
};

/* ---------- utils ---------- */

function fmtMoney(n){
  n = Number(n)||0;
  const neg = n < -0.004;
  const abs = Math.abs(n);
  const s = abs.toLocaleString('en-ZA', {minimumFractionDigits:2, maximumFractionDigits:2});
  return (neg ? "(R " + s + ")" : "R " + s);
}
function fmtDate(d){
  if(!d) return "";
  const dt = new Date(d+"T00:00:00");
  return dt.toLocaleDateString('en-GB', {day:'numeric', month:'short', year:'numeric'});
}
function shortFYLabel(fy){
  const sy = fy.startDate.slice(0,4), ey = fy.endDate.slice(0,4);
  return sy===ey ? sy : (sy+"/"+ey);
}
function fyDateRangeLabel(fy){
  return fmtDate(fy.startDate) + " – " + fmtDate(fy.endDate);
}
function monthKey(dateStr){ return dateStr ? dateStr.slice(0,7) : ""; }
function monthDisplay(key){
  if(!key) return "";
  const d = new Date(key+"-01T00:00:00");
  return d.toLocaleString('en-US',{month:'long',year:'numeric'});
}
function fyMonthKeys(fy){
  const keys = [];
  let d = new Date(fy.startDate+"T00:00:00");
  const end = new Date(fy.endDate+"T00:00:00");
  let guard=0;
  while(d <= end && guard<36){
    keys.push(d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,'0'));
    d.setMonth(d.getMonth()+1);
    guard++;
  }
  return keys;
}
function uid(){ return Math.random().toString(36).slice(2,10) + Date.now().toString(36); }
function clubInitials(name){
  const words = (name||"").trim().split(/\s+/).filter(Boolean);
  if(words.length===0) return "LC";
  if(words.length===1) return words[0].slice(0,2).toUpperCase();
  return (words[0][0]+words[1][0]).toUpperCase();
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=> t.classList.remove('show'), 2200);
}

// Turns a button into a two-click "confirm delete" control: first click asks
// for confirmation, second click (within a few seconds) actually deletes.
function makeConfirmDelete(button, doDelete, confirmLabel){
  const originalLabel = button.textContent;
  let confirming = false;
  let timer = null;
  button.onclick = (e)=>{
    e.stopPropagation();
    if(!confirming){
      confirming = true;
      button.textContent = confirmLabel || "Confirm?";
      button.classList.add('confirming');
      timer = setTimeout(()=>{
        confirming = false;
        button.textContent = originalLabel;
        button.classList.remove('confirming');
      }, 3000);
    } else {
      clearTimeout(timer);
      doDelete();
    }
  };
}

function withTimeout(promise, ms){
  return Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(()=> reject(new Error("Request timed out")), ms))
  ]);
}

async function uploadAttachment(file){
  if(!useSupabase || !sb){ showToast("Attachments need this app connected to Supabase"); return null; }
  if(file.size > 10*1024*1024){ showToast("File is too large — please keep attachments under 10MB"); return null; }
  try{
    const safeName = file.name.replace(/[^a-zA-Z0-9.\-_]/g,'_');
    const path = `${Date.now()}_${safeName}`;
    const { error } = await withTimeout(sb.storage.from('receipts').upload(path, file), 20000);
    if(error) throw error;
    const { data } = sb.storage.from('receipts').getPublicUrl(path);
    return { url: data.publicUrl, path, name: file.name };
  }catch(e){
    console.error("Attachment upload failed:", e);
    showToast("Couldn't upload attachment — transaction saved without it");
    return null;
  }
}
async function deleteAttachment(path){
  if(!useSupabase || !sb || !path) return;
  try{ await sb.storage.from('receipts').remove([path]); }
  catch(e){ console.error("Attachment delete failed:", e); }
}

async function loadState(){
  try{
    if(useSupabase && sb){
      const { data, error } = await withTimeout(
        sb.from('kv_store').select('value').eq('key', STORAGE_KEY).maybeSingle(),
        10000
      );
      if(error) throw error;
      if(data && data.value){
        state = Object.assign(state, data.value, {
          tab: state.tab, ui: {},
          club: Object.assign({}, state.club, data.value.club)
        });
      }
    } else if(!useSupabase && window.storage){
      const res = await window.storage.get(STORAGE_KEY, false);
      if(res && res.value){
        const parsed = JSON.parse(res.value);
        state = Object.assign(state, parsed, {
          tab: state.tab, ui: {},
          club: Object.assign({}, state.club, parsed.club)
        });
      }
    }
    // Migrate legacy single "bankDetails" field into the new Admin/Projects split
    if(state.club.bankDetails && !state.club.bankDetailsAdmin && !state.club.bankDetailsProjects){
      state.club.bankDetailsAdmin = state.club.bankDetails;
      state.club.bankDetailsProjects = state.club.bankDetails;
    }
    delete state.club.bankDetails;
  }catch(e){
    console.error("Couldn't load saved data — starting with a blank slate:", e);
    showToast("Couldn't load saved data — check your connection and refresh");
  }
}
async function saveState(){
  const payload = {
    club: state.club,
    fiscalYear: state.fiscalYear,
    openingBalances: state.openingBalances,
    transactions: state.transactions,
    categories: state.categories,
    dues: state.dues,
    closedYears: state.closedYears,
    donorDocuments: state.donorDocuments
  };
  try{
    if(useSupabase && sb){
      const { error } = await withTimeout(
        sb.from('kv_store').upsert({ key: STORAGE_KEY, value: payload, updated_at: new Date().toISOString() }),
        10000
      );
      if(error) throw error;
    } else if(window.storage){
      await window.storage.set(STORAGE_KEY, JSON.stringify(payload), false);
    }
  }catch(e){ console.error("Save failed:", e); showToast("Couldn't save — your changes may not persist"); }
}

/* ---------- dataset helpers (current FY or a closed year) ---------- */

function getPeriod(periodId){
  if(!periodId || periodId==="current"){
    return { id:"current", label:"Current — "+shortFYLabel(state.fiscalYear), fiscalYear: state.fiscalYear,
      openingBalances: state.openingBalances, transactions: state.transactions, closed:false };
  }
  const cy = state.closedYears.find(c=>c.id===periodId);
  if(cy) return { id:cy.id, label:shortFYLabel(cy.fiscalYear)+" (closed)", fiscalYear: cy.fiscalYear,
    openingBalances: cy.openingBalances, transactions: cy.transactions, closed:true, closingBalances: cy.closingBalances };
  return getPeriod("current");
}
function periodOptions(){
  const opts = [["current","Current — "+shortFYLabel(state.fiscalYear)]];
  [...state.closedYears].sort((a,b)=>b.fiscalYear.startDate.localeCompare(a.fiscalYear.startDate)).forEach(c=>{
    opts.push([c.id, shortFYLabel(c.fiscalYear)+" (closed)"]);
  });
  return opts;
}

function accountTotalsFor(period, account){
  let income=0, expense=0;
  period.transactions.filter(t=>t.account===account).forEach(t=>{ income += Number(t.income)||0; expense += Number(t.expense)||0; });
  const opening = period.openingBalances[account];
  return { income, expense, opening, balance: opening + income - expense };
}

function allCategoriesFor(period){
  const extra = new Set();
  period.transactions.forEach(t=>{ if(t.type && !state.categories.includes(t.type)) extra.add(t.type); });
  return [...state.categories, ...[...extra].sort()];
}

function monthlyStatement(period, account, mKey){
  const rows = allCategoriesFor(period).map(cat=>{
    let income=0, expense=0;
    period.transactions.forEach(t=>{
      if(t.account===account && monthKey(t.date)===mKey && t.type===cat){ income += Number(t.income)||0; expense += Number(t.expense)||0; }
    });
    return { cat, income, expense };
  });
  return { rows, totalIncome: rows.reduce((s,r)=>s+r.income,0), totalExpense: rows.reduce((s,r)=>s+r.expense,0) };
}

function balanceCarriedForwardBefore(period, account, mKey){
  const months = allMonthsChronological(period);
  const idx = months.indexOf(mKey);
  let bal = period.openingBalances[account];
  months.slice(0, idx<0?months.length:idx).forEach(m=>{
    period.transactions.forEach(t=>{ if(t.account===account && monthKey(t.date)===m){ bal += (Number(t.income)||0) - (Number(t.expense)||0); } });
  });
  return bal;
}

function allMonthsChronological(period){
  const present = new Set(period.transactions.map(t=>monthKey(t.date)));
  return fyMonthKeys(period.fiscalYear).filter(m=>present.has(m));
}

function topCategories(period, account, limit){
  const map = {};
  period.transactions.filter(t=>t.account===account).forEach(t=>{
    map[t.type] = (map[t.type]||0) + (Number(t.income)||0) + (Number(t.expense)||0);
  });
  return Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,limit);
}

function categoryReport(period, account, category){
  const months = fyMonthKeys(period.fiscalYear);
  const rows = months.map(mk=>{
    let income=0, expense=0;
    period.transactions.forEach(t=>{
      if(t.account===account && monthKey(t.date)===mk && (category==="All"||t.type===category)){ income+=Number(t.income)||0; expense+=Number(t.expense)||0; }
    });
    return { month:mk, income, expense };
  });
  return { rows, totalIncome: rows.reduce((s,r)=>s+r.income,0), totalExpense: rows.reduce((s,r)=>s+r.expense,0) };
}

/* ---------- year close ---------- */

function closeCurrentYear(){
  const admin = accountTotalsFor({fiscalYear:state.fiscalYear, openingBalances:state.openingBalances, transactions:state.transactions}, "Admin");
  const projects = accountTotalsFor({fiscalYear:state.fiscalYear, openingBalances:state.openingBalances, transactions:state.transactions}, "Projects");
  const closingBalances = { Admin: admin.balance, Projects: projects.balance };
  state.closedYears.push({
    id: uid(),
    fiscalYear: { ...state.fiscalYear },
    openingBalances: { ...state.openingBalances },
    closingBalances,
    transactions: state.transactions.map(t=>({...t}))
  });
  const nextStart = new Date(state.fiscalYear.endDate+"T00:00:00");
  nextStart.setDate(nextStart.getDate()+1);
  const nextEnd = new Date(nextStart);
  nextEnd.setFullYear(nextEnd.getFullYear()+1);
  nextEnd.setDate(nextEnd.getDate()-1);
  const iso = d => d.toISOString().slice(0,10);
  state.fiscalYear = { startDate: iso(nextStart), endDate: iso(nextEnd) };
  state.openingBalances = closingBalances;
  state.transactions = [];
  saveState();
}

function renderLedgerTable(holder, period){
  const ledgerFilter = state.ui.ledgerFilter;
  holder.innerHTML = "";
  let rows = [...state.transactions].sort((a,b)=> (b.date||"").localeCompare(a.date||""));
  if(ledgerFilter.account!=="All") rows = rows.filter(t=>t.account===ledgerFilter.account);
  if(ledgerFilter.month!=="All") rows = rows.filter(t=>monthKey(t.date)===ledgerFilter.month);
  if(ledgerFilter.search.trim()){
    const q = ledgerFilter.search.trim().toLowerCase();
    rows = rows.filter(t=> (t.reference||"").toLowerCase().includes(q) || (t.type||"").toLowerCase().includes(q));
  }
  if(rows.length===0){
    holder.appendChild(el(`<div class="empty"><div class="big">No matching transactions</div>Try adjusting your filters, or add a new entry above.</div>`));
    return;
  }
  const tbl = el(`<table><thead><tr><th>Date</th><th>Account</th><th>Category</th><th>Reference</th><th class="right">Income</th><th class="right">Expense</th><th style="width:90px;">Attachment</th><th></th></tr></thead><tbody></tbody></table>`);
  const tb = tbl.querySelector('tbody');
  rows.forEach(t=>{
    const tr = el(`<tr>
      <td class="muted">${fmtDate(t.date)}</td>
      <td><span class="tag ${t.account.toLowerCase()}">${t.account}</span></td>
      <td>${t.type}</td>
      <td class="muted">${t.reference||"—"}</td>
      <td class="right num pos">${t.income? fmtMoney(t.income):""}</td>
      <td class="right num neg">${t.expense? fmtMoney(t.expense):""}</td>
      <td class="right" style="white-space:nowrap;">
        ${t.attachment?.url?`<a href="${t.attachment.url}" target="_blank" rel="noopener" title="View ${t.attachment.name||'attachment'}" style="margin-right:6px;">📎</a>`:""}
        <span class="no-print">
          <button class="btn ghost small" data-act="attach">${t.attachment?.url?'Replace':'Attach'}</button>
          <input type="file" accept="image/*,.pdf" style="display:none;">
        </span>
      </td>
      <td class="right no-print"><button class="btn ghost small" data-act="delete">Delete</button></td>
    </tr>`);
    const fileInput = tr.querySelector('input[type=file]');
    tr.querySelector('[data-act=attach]').onclick = ()=> fileInput.click();
    fileInput.onchange = async ()=>{
      const file = fileInput.files[0];
      if(!file) return;
      const btn = tr.querySelector('[data-act=attach]');
      const oldLabel = btn.textContent;
      btn.disabled = true; btn.textContent = "Uploading…";
      const oldAttachment = t.attachment;
      const uploaded = await uploadAttachment(file);
      if(uploaded){
        t.attachment = uploaded;
        if(oldAttachment?.path) deleteAttachment(oldAttachment.path);
        saveState();
        showToast("Attachment saved");
        renderLedgerTable(holder, period);
      } else {
        btn.disabled = false; btn.textContent = oldLabel;
      }
    };
    makeConfirmDelete(tr.querySelector('[data-act=delete]'), ()=>{
      if(t.attachment?.path) deleteAttachment(t.attachment.path);
      state.transactions = state.transactions.filter(x=>x.id!==t.id);
      saveState(); renderLedgerTable(holder, period); showToast("Transaction removed");
    }, "Confirm?");
    tb.appendChild(tr);
  });
  holder.appendChild(tbl);
}

function renderReports(){
  state.ui.reportPeriod = state.ui.reportPeriod || "current";
  state.ui.reportAccount = state.ui.reportAccount || "Admin";
  state.ui.reportMode = state.ui.reportMode || "monthly";
  state.ui.reportCategory = state.ui.reportCategory || "All";
  if(state.ui.reportShowSignatures === undefined) state.ui.reportShowSignatures = true;

  const period = getPeriod(state.ui.reportPeriod);
  const months = fyMonthKeys(period.fiscalYear);
  state.ui.reportMonth = state.ui.reportMonth && months.includes(state.ui.reportMonth) ? state.ui.reportMonth : (allMonthsChronological(period).slice(-1)[0] || months[0]);

  const wrap = el(`<div></div>`);
  const controls = el(`<div class="filters no-print" style="margin-bottom:20px;"></div>`);

  const periodSel = el(`<select>${periodOptions().map(([id,label])=>`<option value="${id}" ${id===state.ui.reportPeriod?'selected':''}>${label}</option>`).join('')}</select>`);
  periodSel.onchange = ()=>{ state.ui.reportPeriod = periodSel.value; state.ui.reportMonth=null; render(); };
  controls.appendChild(periodSel);

  const accToggle = el(`<div class="toggle-group" style="width:220px;">
    <button data-acc="Admin" class="${state.ui.reportAccount==='Admin'?'on admin':''}">Admin</button>
    <button data-acc="Projects" class="${state.ui.reportAccount==='Projects'?'on projects':''}">Projects</button></div>`);
  accToggle.querySelectorAll('button').forEach(b=> b.onclick = ()=>{ state.ui.reportAccount=b.dataset.acc; render(); });
  controls.appendChild(accToggle);

  const modeToggle = el(`<div class="toggle-group" style="width:260px;">
    <button data-m="monthly" class="${state.ui.reportMode==='monthly'?'on admin':''}">Monthly statement</button>
    <button data-m="category" class="${state.ui.reportMode==='category'?'on admin':''}">By category</button></div>`);
  modeToggle.querySelectorAll('button').forEach(b=> b.onclick = ()=>{ state.ui.reportMode=b.dataset.m; render(); });
  controls.appendChild(modeToggle);

  if(state.ui.reportMode==="monthly"){
    const monthSel = el(`<select>${months.map(m=>`<option value="${m}" ${m===state.ui.reportMonth?'selected':''}>${monthDisplay(m)}</option>`).join('')}</select>`);
    monthSel.onchange = ()=>{ state.ui.reportMonth = monthSel.value; render(); };
    controls.appendChild(monthSel);

    const sigToggle = el(`<label style="display:flex; align-items:center; gap:7px; font-size:13px; color:var(--ink-soft); cursor:pointer;">
      <input type="checkbox" style="width:auto;" ${state.ui.reportShowSignatures?'checked':''}> Include signatures
    </label>`);
    sigToggle.querySelector('input').onchange = (e)=>{ state.ui.reportShowSignatures = e.target.checked; render(); };
    controls.appendChild(sigToggle);
  } else {
    const catSel = el(`<select><option value="All">All categories</option>${allCategoriesFor(period).map(c=>`<option ${c===state.ui.reportCategory?'selected':''}>${c}</option>`).join('')}</select>`);
    catSel.onchange = ()=>{ state.ui.reportCategory = catSel.value; render(); };
    controls.appendChild(catSel);
  }
  wrap.appendChild(controls);

  if(period.transactions.length===0){
    wrap.appendChild(el(`<div class="card"><div class="empty"><div class="big">No transactions for this period</div>Add ledger entries, or pick a different financial year above.</div></div>`));
    return wrap;
  }

  if(state.ui.reportMode==="monthly"){
    const stmt = monthlyStatement(period, state.ui.reportAccount, state.ui.reportMonth);
    const openingCF = balanceCarriedForwardBefore(period, state.ui.reportAccount, state.ui.reportMonth);
    const closingCF = openingCF + stmt.totalIncome - stmt.totalExpense;
    const card = el(`<div class="card report-card"></div>`);
    card.appendChild(el(`<div class="section-title">${state.club.name} — ${state.ui.reportAccount} Account — ${monthDisplay(state.ui.reportMonth)}<div class="rule"></div></div>`));
    const statement = el(`<table class="statement-table"><thead><tr>
      <th>Income</th><th class="right">Amount</th><th class="col-divider">Expenses</th><th class="right">Amount</th>
    </tr></thead><tbody></tbody><tfoot></tfoot></table>`);
    const stb = statement.querySelector('tbody');
    stmt.rows.forEach(r=>{
      stb.appendChild(el(`<tr>
        <td>${r.cat}</td>
        <td class="right num ${r.income?'':'zero'}">${fmtMoney(r.income)}</td>
        <td class="col-divider">${r.cat}</td>
        <td class="right num ${r.expense?'':'zero'}">${fmtMoney(r.expense)}</td>
      </tr>`));
    });
    statement.querySelector('tfoot').appendChild(el(`<tr class="total-row">
      <td>Total income</td>
      <td class="right num pos">${fmtMoney(stmt.totalIncome)}</td>
      <td class="col-divider">Total expenses</td>
      <td class="right num neg">${fmtMoney(stmt.totalExpense)}</td>
    </tr>`));
    card.appendChild(statement);
    const strip = el(`<div class="balance-strip"></div>`);
    strip.appendChild(el(`<div class="balance-box"><div class="label">Balance brought forward</div><div class="val num">${fmtMoney(openingCF)}</div></div>`));
    strip.appendChild(el(`<div class="balance-box"><div class="label">Net movement this month</div><div class="val num ${stmt.totalIncome-stmt.totalExpense>=0?'pos':'neg'}">${fmtMoney(stmt.totalIncome-stmt.totalExpense)}</div></div>`));
    strip.appendChild(el(`<div class="balance-box"><div class="label">Balance carried forward</div><div class="val num">${fmtMoney(closingCF)}</div></div>`));
    card.appendChild(strip);
    if(state.ui.reportShowSignatures){ card.appendChild(renderSignatureBlock()); }
    wrap.appendChild(card);
  } else {
    const rep = categoryReport(period, state.ui.reportAccount, state.ui.reportCategory);
    const card = el(`<div class="card report-card"></div>`);
    card.appendChild(el(`<div class="section-title">${state.ui.reportCategory} — ${state.ui.reportAccount} Account — FY ${shortFYLabel(period.fiscalYear)}<div class="rule"></div></div>`));
    const tbl = el(`<table><thead><tr><th>Month</th><th class="right">Income</th><th class="right">Expense</th><th class="right">Net</th></tr></thead><tbody></tbody></table>`);
    const tb = tbl.querySelector('tbody');
    rep.rows.forEach(r=>{
      const net = r.income - r.expense;
      tb.appendChild(el(`<tr><td>${monthDisplay(r.month)}</td>
        <td class="right num ${r.income?'pos':''}">${r.income?fmtMoney(r.income):'—'}</td>
        <td class="right num ${r.expense?'neg':''}">${r.expense?fmtMoney(r.expense):'—'}</td>
        <td class="right num">${fmtMoney(net)}</td></tr>`));
    });
    tb.appendChild(el(`<tr style="font-weight:700; border-top:2px solid var(--ink);"><td>Total</td>
      <td class="right num pos">${fmtMoney(rep.totalIncome)}</td>
      <td class="right num neg">${fmtMoney(rep.totalExpense)}</td>
      <td class="right num">${fmtMoney(rep.totalIncome-rep.totalExpense)}</td></tr>`));
    card.appendChild(tbl);
    wrap.appendChild(card);
  }
  return wrap;
}

/* ---- Balance Sheet ---- */
function renderBalanceSheet(){
  const period = getPeriod("current");
  const admin = accountTotalsFor(period,"Admin");
  const projects = accountTotalsFor(period,"Projects");

  const wrap = el(`<div></div>`);
  const card = el(`<div class="card" style="margin-bottom:20px;"></div>`);
  card.appendChild(el(`<div class="section-title">Current financial year — ${fyDateRangeLabel(state.fiscalYear)}<div class="rule"></div></div>`));

  const tbl = el(`<table><thead><tr><th>Account</th><th class="right">Opening balance</th><th class="right">Income</th><th class="right">Expenses</th><th class="right">Current balance</th></tr></thead><tbody></tbody></table>`);
  const tb = tbl.querySelector('tbody');
  [["Admin",admin],["Projects",projects]].forEach(([name,a])=>{
    tb.appendChild(el(`<tr><td><span class="tag ${name.toLowerCase()}">${name}</span></td>
      <td class="right num">${fmtMoney(a.opening)}</td>
      <td class="right num pos">${fmtMoney(a.income)}</td>
      <td class="right num neg">${fmtMoney(a.expense)}</td>
      <td class="right num" style="font-weight:700;">${fmtMoney(a.balance)}</td></tr>`));
  });
  tb.appendChild(el(`<tr style="font-weight:700; border-top:2px solid var(--ink);"><td>Combined</td>
    <td class="right num">${fmtMoney(admin.opening+projects.opening)}</td>
    <td class="right num pos">${fmtMoney(admin.income+projects.income)}</td>
    <td class="right num neg">${fmtMoney(admin.expense+projects.expense)}</td>
    <td class="right num">${fmtMoney(admin.balance+projects.balance)}</td></tr>`));
  card.appendChild(tbl);

  const closeArea = el(`<div class="no-print" style="margin-top:18px;"></div>`);
  const closeBtn = el(`<button class="btn ghost">Close this financial year</button>`);
  closeArea.appendChild(el(`<p class="section-sub" style="margin-top:14px;">Closing the year archives every transaction above, carries the closing balances forward as next year's opening balances, and starts a fresh ledger for the new financial year.</p>`));
  closeArea.appendChild(closeBtn);
  card.appendChild(closeArea);

  closeBtn.onclick = ()=>{
    const confirmBox = el(`<div class="confirm-box">
      <span>Close FY ${shortFYLabel(state.fiscalYear)}? This archives ${state.transactions.length} transaction(s) and starts a new ledger.</span>
      <div class="actions"><button class="btn danger small">Yes, close it</button><button class="btn ghost small">Cancel</button></div>
    </div>`);
    const [yesBtn, cancelBtn] = confirmBox.querySelectorAll('button');
    yesBtn.onclick = ()=>{ closeCurrentYear(); showToast("Financial year closed — new ledger started"); render(); };
    cancelBtn.onclick = ()=> confirmBox.remove();
    closeArea.appendChild(confirmBox);
  };
  wrap.appendChild(card);

  const histCard = el(`<div class="card"></div>`);
  histCard.appendChild(el(`<div class="section-title">Closed years<div class="rule"></div></div>`));
  if(state.closedYears.length===0){
    histCard.appendChild(el(`<div class="empty">No years closed off yet — this club's history will build up here each time you close a year.</div>`));
  } else {
    const htbl = el(`<table><thead><tr><th>Financial year</th><th class="right">Admin closing</th><th class="right">Projects closing</th><th class="right">Combined</th><th></th></tr></thead><tbody></tbody></table>`);
    const htb = htbl.querySelector('tbody');
    [...state.closedYears].sort((a,b)=>b.fiscalYear.startDate.localeCompare(a.fiscalYear.startDate)).forEach(cy=>{
      const combined = cy.closingBalances.Admin + cy.closingBalances.Projects;
      const tr = el(`<tr>
        <td><span class="closed-badge">🔒 ${fyDateRangeLabel(cy.fiscalYear)}</span></td>
        <td class="right num">${fmtMoney(cy.closingBalances.Admin)}</td>
        <td class="right num">${fmtMoney(cy.closingBalances.Projects)}</td>
        <td class="right num" style="font-weight:700;">${fmtMoney(combined)}</td>
        <td class="right"><button class="btn ghost small">View reports</button></td>
      </tr>`);
      tr.querySelector('button').onclick = ()=>{ state.tab="reports"; state.ui.reportPeriod = cy.id; render(); };
      htb.appendChild(tr);
    });
    histCard.appendChild(htbl);
  }
  wrap.appendChild(histCard);
  return wrap;
}

/* ---- Dues ---- */
function buildMemberStatementPdf(member){
  if(!window.jspdf || !window.jspdf.jsPDF){ showToast("PDF library still loading — try again in a moment"); return null; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const marginX = 15;
  const rightX = 195;
  let y = 20;
  const textStartX = state.club.logo ? marginX + 24 : marginX;

  if(state.club.logo){
    try{ doc.addImage(state.club.logo, 'PNG', marginX, y-9, 18, 18); }catch(e){ /* ignore bad image */ }
  }
  doc.setFont('helvetica','bold'); doc.setFontSize(15); doc.setTextColor(20,42,70);
  doc.text(state.club.name, textStartX, y);
  doc.setFont('helvetica','normal'); doc.setFontSize(9.5); doc.setTextColor(90,100,115);
  doc.text(`Financial year: ${fyDateRangeLabel(state.fiscalYear)}`, textStartX, y+6);
  doc.setTextColor(20,20,20);

  y += 20;
  doc.setDrawColor(200,154,62); doc.setLineWidth(0.6); doc.line(marginX, y, rightX, y);
  y += 10;

  doc.setFontSize(13); doc.setFont('helvetica','bold');
  doc.text('Member Dues Statement', marginX, y);
  y += 9;
  doc.setFontSize(10.5); doc.setFont('helvetica','normal');
  doc.text(`Member: ${member.name}`, marginX, y); y += 6;
  doc.text(`Membership type: ${member.type}`, marginX, y); y += 6;
  doc.text(`Statement date: ${fmtDate(new Date().toISOString().slice(0,10))}`, marginX, y); y += 12;

  const colDate = marginX, colDesc = marginX+26, colCharge = 130, colPayment = 158, colBalance = rightX;
  doc.setFont('helvetica','bold'); doc.setFontSize(9.5);
  doc.text('Date', colDate, y);
  doc.text('Description', colDesc, y);
  doc.text('Charge', colCharge, y, {align:'right'});
  doc.text('Payment', colPayment, y, {align:'right'});
  doc.text('Balance', colBalance, y, {align:'right'});
  y += 2.5;
  doc.setDrawColor(19,42,70); doc.setLineWidth(0.3); doc.line(marginX, y, rightX, y);
  y += 6.5;
  doc.setFont('helvetica','normal');

  const rows = [...member.history].sort((a,b)=> a.date.localeCompare(b.date));
  let running = 0;
  if(rows.length===0){
    doc.setTextColor(120); doc.text('No charges or payments recorded for this member yet.', marginX, y);
    doc.setTextColor(20); y += 8;
  }
  rows.forEach(h=>{
    if(y > 275){ doc.addPage(); y = 20; }
    const chg = h.kind==='charge' ? h.amount : 0;
    const pay = h.kind==='payment' ? h.amount : 0;
    running += chg - pay;
    doc.text(fmtDate(h.date), colDate, y);
    const note = h.note && h.note.length>42 ? h.note.slice(0,42)+'…' : (h.note||'');
    doc.text(note, colDesc, y);
    doc.text(chg ? fmtMoney(chg).replace('R ','') : '–', colCharge, y, {align:'right'});
    doc.text(pay ? fmtMoney(pay).replace('R ','') : '–', colPayment, y, {align:'right'});
    doc.text(fmtMoney(running).replace('R ',''), colBalance, y, {align:'right'});
    y += 7;
  });

  y += 3;
  doc.setDrawColor(19,42,70); doc.setLineWidth(0.5); doc.line(marginX, y, rightX, y);
  y += 9;
  doc.setFont('helvetica','bold'); doc.setFontSize(12);
  doc.text(`Balance owing: ${fmtMoney(member.owing)}`, marginX, y);

  y = addPdfFooterDetails(doc, marginX, y, state.club.bankDetailsAdmin);

  return doc;
}

function downloadMemberStatement(member){
  const doc = buildMemberStatementPdf(member);
  if(!doc) return;
  doc.save(`${member.name.replace(/\s+/g,'_')}_Dues_Statement.pdf`);
}

// Automatic send via the Supabase Edge Function + Resend (needs setup — see Settings).
async function emailMemberStatement(member, triggerBtn){
  if(!member.email){ showToast(`${member.name} has no email address on file`); return; }
  if(!useSupabase || !sb){ showToast("Emailing needs this app connected to Supabase"); return; }
  const doc = buildMemberStatementPdf(member);
  if(!doc) return;
  const base64 = doc.output('datauristring').split(',')[1];
  const fileName = `${member.name.replace(/\s+/g,'_')}_Dues_Statement.pdf`;
  const original = triggerBtn ? triggerBtn.textContent : null;
  if(triggerBtn){ triggerBtn.disabled = true; triggerBtn.textContent = "Sending…"; }
  try{
    const { data, error } = await withTimeout(sb.functions.invoke('send-Statement', {
      body: {
        to: member.email,
        subject: `${state.club.name} — Dues Statement`,
        html: `<p>Hi ${member.name.split(' ')[0]},</p><p>Please find your latest dues statement from ${state.club.name} attached.</p><p>Current balance owing: <strong>${fmtMoney(member.owing)}</strong></p><p>Kind regards,<br>${state.club.name}</p>`,
        attachmentBase64: base64,
        attachmentName: fileName
      }
    }), 20000);
    if(error) throw error;
    showToast(`Statement emailed to ${member.name}`);
    return true;
  }catch(e){
    console.error("Email send failed:", e);
    showToast(`Couldn't email ${member.name} — check the email setup in Settings`);
    return false;
  }finally{
    if(triggerBtn){ triggerBtn.disabled = false; triggerBtn.textContent = original; }
  }
}

async function emailAllMemberStatements(triggerBtn){
  const recipients = state.dues.filter(d=> d.email && d.email.trim());
  if(recipients.length===0){ showToast("No members have an email address on file yet"); return; }
  const original = triggerBtn.textContent;
  triggerBtn.disabled = true;
  let sent = 0, failed = 0;
  for(let i=0;i<recipients.length;i++){
    triggerBtn.textContent = `Sending ${i+1} of ${recipients.length}…`;
    const ok = await emailMemberStatement(recipients[i], null);
    if(ok) sent++; else failed++;
    await new Promise(r=> setTimeout(r, 400));
  }
  triggerBtn.disabled = false;
  triggerBtn.textContent = original;
  const skipped = state.dues.length - recipients.length;
  showToast(`Sent ${sent} statement(s)${failed?`, ${failed} failed`:''}${skipped?`, ${skipped} skipped (no email)`:''}`);
}

// Zero-setup fallback: downloads the PDF and opens a pre-filled email draft
// for the user to manually attach and send. Not currently wired to any
// button, kept here in case automatic sending needs to be switched off again.
function emailMemberStatementManual(member){
  if(!member.email){ showToast(`${member.name} has no email address on file`); return; }
  const doc = buildMemberStatementPdf(member);
  if(!doc) return;
  const fileName = `${member.name.replace(/\s+/g,'_')}_Dues_Statement.pdf`;
  doc.save(fileName);
  const firstName = member.name.split(' ')[0];
  const subject = `${state.club.name} — Dues Statement`;
  const body = `Hi ${firstName},\n\nPlease find your latest dues statement attached — it was just downloaded to your computer as "${fileName}", so please attach it to this email before sending.\n\nCurrent balance owing: ${fmtMoney(member.owing)}\n\nKind regards,\n${state.club.name}`;
  const mailto = `mailto:${encodeURIComponent(member.email)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  window.location.href = mailto;
}

function addPdfFooterDetails(doc, marginX, y, bankDetailsText){
  if(bankDetailsText && bankDetailsText.trim()){
    y += 14;
    if(y > 255){ doc.addPage(); y = 20; }
    doc.setFont('helvetica','bold'); doc.setFontSize(10.5); doc.setTextColor(20,42,70);
    doc.text('Payment details', marginX, y);
    y += 6;
    doc.setFont('helvetica','normal'); doc.setFontSize(9.5); doc.setTextColor(60,70,85);
    bankDetailsText.trim().split('\n').forEach(line=>{
      if(y > 280){ doc.addPage(); y = 20; }
      doc.text(line, marginX, y);
      y += 5.5;
    });
  }
  if(state.club.treasurerName || state.club.treasurerEmail){
    y += 10;
    if(y > 270){ doc.addPage(); y = 20; }
    doc.setFont('helvetica','bold'); doc.setFontSize(10.5); doc.setTextColor(20,42,70);
    doc.text('Any queries', marginX, y);
    y += 6;
    doc.setFont('helvetica','normal'); doc.setFontSize(9.5); doc.setTextColor(60,70,85);

    doc.text(`Treasurer: ${contact}`, marginX, y);
    y += 5.5;
  }
  doc.setTextColor(20,20,20);
  return y;
}

function downloadDonorDocument(record){
  const doc = buildDonorDocumentPdf(record);
  if(!doc) return;
  doc.save(`${record.number}_${record.donorName.replace(/\s+/g,'_')}.pdf`);
}

function viewDonorDocument(record){
  const doc = buildDonorDocumentPdf(record);
  if(!doc) return;
  window.open(doc.output('bloburl'), '_blank');
}

function createDonorDocument(type, data){
  const countOfType = state.donorDocuments.filter(d=>d.type===type).length;
  const number = (type==='invoice' ? 'INV-' : 'REC-') + String(countOfType+1).padStart(4,'0');
  const record = { id: uid(), type, number, ...data, createdAt: new Date().toISOString() };
  state.donorDocuments.push(record);
  saveState();
  downloadDonorDocument(record);
  showToast(`${type==='invoice'?'Invoice':'Receipt'} ${number} generated`);
  render();
}

function ensureChargeDraft(){
  if(!state.ui.chargeDraft){
    state.ui.chargeDraft = {};
    state.dues.forEach(m=>{ state.ui.chargeDraft[m.id] = { amount: MEMBERSHIP_RATES[m.type] ?? 0, include:false }; });
  } else {
    // keep draft in sync if members were added/removed since it was created
    state.dues.forEach(m=>{ if(!(m.id in state.ui.chargeDraft)) state.ui.chargeDraft[m.id] = { amount: MEMBERSHIP_RATES[m.type] ?? 0, include:false }; });
  }
}

function readImageAsDataUrl(file, maxDim, onDone, onError){
  const reader = new FileReader();
  reader.onload = ()=>{
    const img = new Image();
    img.onload = ()=>{
      let w = img.width, h = img.height;
      if(w>=h){ if(w>maxDim){ h = Math.round(h*maxDim/w); w = maxDim; } }
      else { if(h>maxDim){ w = Math.round(w*maxDim/h); h = maxDim; } }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      onDone(canvas.toDataURL('image/png'));
    };
    img.onerror = ()=> onError && onError();
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
}

  sigCard.appendChild(el(`<p class="section-sub">Appears as a sign-off block at the bottom of reports, for when they're submitted to members.</p>`));

  const officerBlock = (label, nameVal, nameId, sigKey, sigInputId)=>{
    const box = el(`<div style="margin-bottom:18px; padding-bottom:18px; border-bottom:1px solid var(--card-border);"></div>`);
    box.appendChild(el(`<div class="field" style="margin-bottom:10px;"><label>${label} name</label><input type="text" id="${nameId}" value="${nameVal||""}" placeholder="Full name"></div>`));
    const sigRow = el(`<div style="display:flex; align-items:center; gap:16px; flex-wrap:wrap;"></div>`);
    const sigPreview = el(`<div style="width:120px;height:44px;border:1px dashed var(--card-border); border-radius:6px; display:flex; align-items:center; justify-content:center; background:#fff; flex-shrink:0;">${state.club[sigKey]?`<img src="${state.club[sigKey]}" style="max-width:100%; max-height:100%; object-fit:contain;">`:`<span class="muted" style="font-size:10px;">No signature</span>`}</div>`);
    const sigInputWrap = el(`<div><label style="display:block; font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-soft); margin-bottom:5px;">${label} signature</label><input type="file" accept="image/*" id="${sigInputId}"></div>`);
    sigRow.appendChild(sigPreview); sigRow.appendChild(sigInputWrap);
    box.appendChild(sigRow);
    if(state.club[sigKey]){
      const removeBtn = el(`<button class="btn ghost small" style="margin-top:8px;">Remove signature</button>`);
      makeConfirmDelete(removeBtn, ()=>{ state.club[sigKey] = null; saveState(); showToast("Signature removed"); render(); }, "Confirm?");
      box.appendChild(removeBtn);
    }
    sigInputWrap.querySelector('input').onchange = (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      readImageAsDataUrl(file, 200,
        (dataUrl)=>{ state.club[sigKey] = dataUrl; saveState(); showToast(`${label} signature updated`); render(); },
        ()=> showToast("Couldn't read that image — try a different file"));
    };
    return box;
  };

  const presidentBox = officerBlock("President", state.club.presidentName, "s-presidentname", "presidentSignature", "s-president-sig");
  sigCard.appendChild(presidentBox);
  const treasurerBox = officerBlock("Treasurer", state.club.treasurerName, "s-treasurername", "treasurerSignature", "s-treasurer-sig");
  treasurerBox.style.marginBottom = "0"; treasurerBox.style.paddingBottom = "0"; treasurerBox.style.borderBottom = "none";
  treasurerBox.querySelector('.field').insertAdjacentElement('afterend', el(`<div class="field" style="margin-bottom:10px;"><label>Treasurer email</label><input type="email" id="s-treasureremail" value="${state.club.treasurerEmail||""}" placeholder="treasurer@club.org"></div>`));
  sigCard.appendChild(treasurerBox);

  const sigSaveBtn = el(`<button class="btn" style="margin-top:18px; display:block;">Save office bearers</button>`);
  sigSaveBtn.onclick = ()=>{
    state.club.presidentName = presidentBox.querySelector('#s-presidentname').value.trim();
    state.club.treasurerName = treasurerBox.querySelector('#s-treasurername').value.trim();
    state.club.treasurerEmail = treasurerBox.querySelector('#s-treasureremail').value.trim();
    saveState(); showToast("Office bearers saved"); render();
  };
  sigCard.appendChild(sigSaveBtn);
  wrap.appendChild(sigCard);

  const catCard = el(`<div class="card" style="max-width:560px; margin-bottom:20px;"></div>`);
  catCard.appendChild(el(`<div class="section-title">Categories<div class="rule"></div></div>`));
  catCard.appendChild(el(`<p class="section-sub">Used for every transaction in the Ledger and for category reports. Removing one won't change past transactions already recorded under it.</p>`));
  const chipWrap = el(`<div class="chip-wrap" style="margin-bottom:16px;"></div>`);
  state.categories.forEach(cat=>{
    const chip = el(`<span class="chip">${cat}<button title="Remove category">✕</button></span>`);
    makeConfirmDelete(chip.querySelector('button'), ()=>{
      state.categories = state.categories.filter(c=>c!==cat);
      saveState(); showToast(`Removed "${cat}"`); render();
    }, "✓");
    chipWrap.appendChild(chip);
  });
  if(state.categories.length===0){ chipWrap.appendChild(el(`<span class="muted" style="font-size:12.5px;">No categories yet — add one below.</span>`)); }
  catCard.appendChild(chipWrap);
  const catForm = el(`<div style="display:flex; gap:10px;">
    <input type="text" id="s-newcat" placeholder="New category name" style="flex:1;">
    <button class="btn">Add category</button>
  </div>`);
  const addCategory = ()=>{
    const input = catForm.querySelector('#s-newcat');
    const name = input.value.trim();
    if(!name){ showToast("Enter a category name"); return; }
    if(state.categories.some(c=>c.toLowerCase()===name.toLowerCase())){ showToast("That category already exists"); return; }
    state.categories.push(name);
    saveState(); showToast(`Added "${name}"`); render();
  };
  catForm.querySelector('button').onclick = addCategory;
  catForm.querySelector('#s-newcat').addEventListener('keydown', e=>{ if(e.key==='Enter') addCategory(); });
  catCard.appendChild(catForm);
  wrap.appendChild(catCard);

  const fyCard = el(`<div class="card" style="max-width:560px; margin-bottom:20px;"></div>`);
  fyCard.appendChild(el(`<div class="section-title">Current financial year<div class="rule"></div></div>`));
  fyCard.appendChild(el(`<p class="section-sub">Sets the date range used for the ledger, monthly statements, and reports. Change this any time — closing a year will move these dates forward automatically.</p>`));
  const fyForm = el(`<div class="form-grid" style="grid-template-columns:1fr 1fr;">
    <div class="field"><label>Start date</label><input type="date" id="s-start" value="${state.fiscalYear.startDate}"></div>
    <div class="field"><label>End date</label><input type="date" id="s-end" value="${state.fiscalYear.endDate}"></div>
  </div>`);
  fyCard.appendChild(fyForm);
  const fySaveBtn = el(`<button class="btn" style="margin-top:14px;">Save financial year</button>`);
  fySaveBtn.onclick = ()=>{
    const start = fyForm.querySelector('#s-start').value;
    const end = fyForm.querySelector('#s-end').value;
    if(!start || !end || start>=end){ showToast("Check the dates — start must be before end"); return; }
    state.fiscalYear = { startDate:start, endDate:end };
    saveState(); showToast("Financial year updated"); render();
  };
  fyCard.appendChild(fySaveBtn);
  wrap.appendChild(fyCard);

  const balCard = el(`<div class="card" style="max-width:560px; margin-bottom:20px;"></div>`);
  balCard.appendChild(el(`<div class="section-title">Opening balances<div class="rule"></div></div>`));
  balCard.appendChild(el(`<p class="section-sub">The balance brought forward at the start of the current financial year. Updated automatically when you close a year.</p>`));
  const balForm = el(`<div class="form-grid" style="grid-template-columns:1fr 1fr;">
    <div class="field"><label>Admin account (R)</label><input type="number" step="0.01" id="s-admin" value="${state.openingBalances.Admin}"></div>
    <div class="field"><label>Projects account (R)</label><input type="number" step="0.01" id="s-projects" value="${state.openingBalances.Projects}"></div>
  </div>`);
  balCard.appendChild(balForm);
  const balSaveBtn = el(`<button class="btn" style="margin-top:14px;">Save opening balances</button>`);
  balSaveBtn.onclick = ()=>{
    state.openingBalances.Admin = parseFloat(balForm.querySelector('#s-admin').value)||0;
    state.openingBalances.Projects = parseFloat(balForm.querySelector('#s-projects').value)||0;
    saveState(); showToast("Opening balances saved"); render();
  };
  balCard.appendChild(balSaveBtn);
  wrap.appendChild(balCard);

  const dangerCard = el(`<div class="card" style="max-width:560px;"></div>`);
  dangerCard.appendChild(el(`<div class="section-title">Data<div class="rule"></div></div>`));
  dangerCard.appendChild(el(`<p class="section-sub">Your ledger, dues, and closed-year history are saved automatically and privately to your account.</p>`));
  const resetBtn = el(`<button class="btn danger">Clear all current-year transactions</button>`);
  const resetArea = el(`<div></div>`);
  resetArea.appendChild(resetBtn);
  resetBtn.onclick = ()=>{
    const confirmBox = el(`<div class="confirm-box">
      <span>This permanently deletes every transaction in the current, open ledger (closed years are unaffected).</span>
      <div class="actions"><button class="btn danger small">Yes, clear it</button><button class="btn ghost small">Cancel</button></div>
    </div>`);
    const [yesBtn, cancelBtn] = confirmBox.querySelectorAll('button');
    yesBtn.onclick = ()=>{ state.transactions = []; saveState(); showToast("Current-year transactions cleared"); render(); };
    cancelBtn.onclick = ()=> confirmBox.remove();
    resetArea.appendChild(confirmBox);
  };
  dangerCard.appendChild(resetArea);
  wrap.appendChild(dangerCard);

  return wrap;
}

/* ---------- boot ---------- */
(async function boot(){
  if(useSupabase && sb){
    try{
      const { data } = await withTimeout(sb.auth.getSession(), 8000);
      authSession = data?.session || null;
    }catch(e){ console.error("Couldn't check login status:", e); }
    sb.auth.onAuthStateChange((_event, session)=>{
      const wasSignedIn = !!authSession;
      authSession = session;
      if(!wasSignedIn && session){ loadState().then(render); }
      else if(wasSignedIn && !session){ render(); }
    });
  }
  if(!useSupabase || authSession){
    try{ await loadState(); }
    catch(e){ console.error("Unexpected error during startup:", e); }
  }
  render();
})();
</script>
</body>
</html>
