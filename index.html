  wrap.appendChild(contactCard);

  // --- Banking details ---
  const bankCard = el(`<div class="card" style="max-width:560px; margin-bottom:20px;"></div>`);
  bankCard.appendChild(el(`<div class="section-title">Banking details<div class="rule"></div></div>`));
  bankCard.appendChild(el(`<p class="section-sub">The Admin account details appear on member dues statements. The Projects account details appear on invoices and receipts.</p>`));

  const bankAdminField = el(`<div class="field" style="margin-bottom:16px;">
    <label>Admin account <span class="muted" style="text-transform:none; font-weight:400;">(used on member statements)</span></label>
    <textarea id="s-bankdetails-admin" rows="4" style="width:100%; padding:9px 10px; border:1px solid var(--card-border); border-radius:7px; font-family:'IBM Plex Mono', monospace; font-size:12.5px; resize:vertical;" placeholder="e.g.&#10;Bank: First National Bank&#10;Account name: Fish Hoek Lions Club - Admin&#10;Account number: 000000000&#10;Branch code: 000000">${state.club.bankDetailsAdmin||""}</textarea>
  </div>`);
  bankCard.appendChild(bankAdminField);

  const bankProjectsField = el(`<div class="field">
    <label>Projects account <span class="muted" style="text-transform:none; font-weight:400;">(used on invoices & receipts)</span></label>
    <textarea id="s-bankdetails-projects" rows="4" style="width:100%; padding:9px 10px; border:1px solid var(--card-border); border-radius:7px; font-family:'IBM Plex Mono', monospace; font-size:12.5px; resize:vertical;" placeholder="e.g.&#10;Bank: First National Bank&#10;Account name: Fish Hoek Lions Club - Projects&#10;Account number: 000000000&#10;Branch code: 000000">${state.club.bankDetailsProjects||""}</textarea>
  </div>`);
  bankCard.appendChild(bankProjectsField);

  const bankSaveBtn = el(`<button class="btn" style="margin-top:16px; display:block;">Save banking details</button>`);
  bankSaveBtn.onclick = ()=>{
    state.club.bankDetailsAdmin = bankAdminField.querySelector('textarea').value.trim();
    state.club.bankDetailsProjects = bankProjectsField.querySelector('textarea').value.trim();
    saveState(); showToast("Banking details saved"); render();
  };
  bankCard.appendChild(bankSaveBtn);
  wrap.appendChild(bankCard);

  // --- Office bearers & signatures ---
  const sigCard = el(`<div class="card" style="max-width:560px; margin-bottom:20px;"></div>`);
  sigCard.appendChild(el(`<div class="section-title">Office bearers & signatures<div class="rule"></div></div>`));
  sigCard.appendChild(el(`<p class="section-sub">Appears as a sign-off block at the bottom of reports, for when they're submitted to members.</p>`));

  const officerBlock = (label, nameVal, nameId, sigKey, sigInputId)=>{
    const box = el(`<div style="margin-bottom:18px; padding-bottom:18px; border-bottom:1px solid var(--card-border);"></div>`);
    box.appendChild(el(`<div class="field" style="margin-bottom:10px;"><label>${label} name</label><input type="text" id="${nameId}" value="${nameVal||""}" placeholder="Full name"></div>`));
    const sigRow = el(`<div style="display:flex; align-items:center; gap:16px; flex-wrap:wrap;"></div>`);
    const sigPreview = el(`<div style="width:120px;height:44px;border:1px dashed var(--card-border); border-radius:6px; display:flex; align-items:center; justify-content:center; background:#fff; flex-shrink:0;">${state.club[sigKey]?`<img src="${state.club[sigKey]}" style="max-width:100%; max-height:100%; object-fit:contain;">`:`<span class="muted" style="font-size:10px;">No signature</span>`}</div>`);
    const sigInputWrap = el(`<div><label style="display:block; font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-soft); margin-bottom:5px;">${label} signature</label><input type="file" accept="image/*" id="${sigInputId}"></div>`);
    sigRow.appendChild(sigPreview); sigRow.appendChild(sigInputWrap);
    box.appendChild(sigRow);
    if(state.club[sigKey]){
      const removeBtn = el(`<button class="btn ghost small" style="margin-top:8px;">Remove signature</button>`);
      makeConfirmDelete(removeBtn, ()=>{ state.club[sigKey] = null; saveState(); showToast("Signature removed"); render(); }, "Confirm?");
      box.appendChild(removeBtn);
    }
    sigInputWrap.querySelector('input').onchange = (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      readImageAsDataUrl(file, 200,
        (dataUrl)=>{ state.club[sigKey] = dataUrl; saveState(); showToast(`${label} signature updated`); render(); },
        ()=> showToast("Couldn't read that image — try a different file"));
    };
    return box;
  };

  const presidentBox = officerBlock("President", state.club.presidentName, "s-presidentname", "presidentSignature", "s-president-sig");
  sigCard.appendChild(presidentBox);
  const treasurerBox = officerBlock("Treasurer", state.club.treasurerName, "s-treasurername", "treasurerSignature", "s-treasurer-sig");
  treasurerBox.style.marginBottom = "0"; treasurerBox.style.paddingBottom = "0"; treasurerBox.style.borderBottom = "none";
  treasurerBox.querySelector('.field').insertAdjacentElement('afterend', el(`<div class="field" style="margin-bottom:10px;"><label>Treasurer email</label><input type="email" id="s-treasureremail" value="${state.club.treasurerEmail||""}" placeholder="treasurer@club.org"></div>`));
  sigCard.appendChild(treasurerBox);

  const sigSaveBtn = el(`<button class="btn" style="margin-top:18px; display:block;">Save office bearers</button>`);
  sigSaveBtn.onclick = ()=>{
    state.club.presidentName = presidentBox.querySelector('#s-presidentname').value.trim();
    state.club.treasurerName = treasurerBox.querySelector('#s-treasurername').value.trim();
    state.club.treasurerEmail = treasurerBox.querySelector('#s-treasureremail').value.trim();
    saveState(); showToast("Office bearers saved"); render();
  };
  sigCard.appendChild(sigSaveBtn);
  wrap.appendChild(sigCard);

  // --- Security ---
  const securityCard = el(`<div class="card" style="max-width:560px; margin-bottom:20px;"></div>`);
  securityCard.appendChild(el(`<div class="section-title">Security<div class="rule"></div></div>`));
  const hasPassword = !!state.security.adminPassword;
  securityCard.appendChild(el(`<p class="section-sub">${hasPassword ? "An administrator password is required to permanently delete a closed financial year — a safeguard against accidental clicks. Changing or removing it requires the current password." : "Set a password below to require it whenever someone tries to permanently delete a closed financial year."}</p>`));

  let currentPassField = null;
  if(hasPassword){
    currentPassField = el(`<div class="field" style="max-width:280px; margin-bottom:14px;"><label>Current password</label><input type="password" id="s-currentpass" placeholder="Required to make changes below"></div>`);
    securityCard.appendChild(currentPassField);
  }
  const secField = el(`<div class="field" style="max-width:280px;"><label>${hasPassword?'New password':'Administrator password'}</label><input type="password" id="s-adminpass" placeholder="${hasPassword ? 'Enter a new password' : 'Leave blank for no password'}"></div>`);
  securityCard.appendChild(secField);
  const secHint = el(`<div class="muted" style="font-size:12px; min-height:16px; margin-top:6px;"></div>`);
  securityCard.appendChild(secHint);
  const secSaveBtn = el(`<button class="btn" style="margin-top:8px; display:block;">${hasPassword?'Update password':'Save password'}</button>`);
  secSaveBtn.onclick = ()=>{
    secHint.textContent = "";
    if(hasPassword){
      const current = currentPassField.querySelector('input').value;
      if(current !== state.security.adminPassword){ secHint.textContent = "Current password is incorrect."; return; }
    }
    const val = secField.querySelector('input').value;
    if(!val){ secHint.textContent = 'Enter a new password, or use "Remove password" below to turn this off.'; return; }
    state.security.adminPassword = val;
    saveState(); showToast(hasPassword ? "Administrator password updated" : "Administrator password set");
    render();
  };
  securityCard.appendChild(secSaveBtn);

  if(hasPassword){
    const removeArea = el(`<div style="margin-top:14px;"></div>`);
    const removePassBtn = el(`<button class="btn ghost small">Remove password</button>`);
    removeArea.appendChild(removePassBtn);
    removePassBtn.onclick = ()=>{
      removeArea.querySelectorAll('.confirm-box').forEach(b=>b.remove());
      const box = el(`<div class="confirm-box">
        <span>Enter the current administrator password to remove it.</span>
        <div class="actions">
          <input type="password" placeholder="Current password" style="width:150px;">
          <button class="btn danger small">Remove</button>
          <button class="btn ghost small">Cancel</button>
        </div>
      </div>`);
      const [pwInput, yesBtn, cancelBtn] = box.querySelectorAll('input, button');
      yesBtn.onclick = ()=>{
        if(pwInput.value !== state.security.adminPassword){ showToast("Incorrect current password"); return; }
        state.security.adminPassword = "";
        saveState(); showToast("Administrator password removed"); render();
      };
      cancelBtn.onclick = ()=> box.remove();
      removeArea.appendChild(box);
    };
    securityCard.appendChild(removeArea);
  }
  wrap.appendChild(securityCard);

  const catCard = el(`<div class="card" style="max-width:560px; margin-bottom:20px;"></div>`);
  catCard.appendChild(el(`<div class="section-title">Categories<div class="rule"></div></div>`));
  catCard.appendChild(el(`<p class="section-sub">Used for every transaction in the Ledger and for category reports. Removing one won't change past transactions already recorded under it.</p>`));
  const chipWrap = el(`<div class="chip-wrap" style="margin-bottom:16px;"></div>`);
  state.categories.forEach(cat=>{
    const chip = el(`<span class="chip">${cat}<button title="Remove category">✕</button></span>`);
    makeConfirmDelete(chip.querySelector('button'), ()=>{
      state.categories = state.categories.filter(c=>c!==cat);
      saveState(); showToast(`Removed "${cat}"`); render();
    }, "✓");
    chipWrap.appendChild(chip);
  });
  if(state.categories.length===0){ chipWrap.appendChild(el(`<span class="muted" style="font-size:12.5px;">No categories yet — add one below.</span>`)); }
  catCard.appendChild(chipWrap);
  const catForm = el(`<div style="display:flex; gap:10px;">
    <input type="text" id="s-newcat" placeholder="New category name" style="flex:1;">
    <button class="btn">Add category</button>
  </div>`);
  const addCategory = ()=>{
    const input = catForm.querySelector('#s-newcat');
    const name = input.value.trim();
    if(!name){ showToast("Enter a category name"); return; }
    if(state.categories.some(c=>c.toLowerCase()===name.toLowerCase())){ showToast("That category already exists"); return; }
    state.categories.push(name);
    saveState(); showToast(`Added "${name}"`); render();
  };
  catForm.querySelector('button').onclick = addCategory;
  catForm.querySelector('#s-newcat').addEventListener('keydown', e=>{ if(e.key==='Enter') addCategory(); });
  catCard.appendChild(catForm);
  wrap.appendChild(catCard);

  const fyCard = el(`<div class="card" style="max-width:560px; margin-bottom:20px;"></div>`);
  fyCard.appendChild(el(`<div class="section-title">Current financial year<div class="rule"></div></div>`));
  fyCard.appendChild(el(`<p class="section-sub">Sets the date range used for the ledger, monthly statements, and reports. Change this any time — closing a year will move these dates forward automatically.</p>`));
  const fyForm = el(`<div class="form-grid" style="grid-template-columns:1fr 1fr;">
    <div class="field"><label>Start date</label><input type="date" id="s-start" value="${state.fiscalYear.startDate}"></div>
    <div class="field"><label>End date</label><input type="date" id="s-end" value="${state.fiscalYear.endDate}"></div>
  </div>`);
  fyCard.appendChild(fyForm);
  const fySaveBtn = el(`<button class="btn" style="margin-top:14px;">Save financial year</button>`);
  fySaveBtn.onclick = ()=>{
    const start = fyForm.querySelector('#s-start').value;
    const end = fyForm.querySelector('#s-end').value;
    if(!start || !end || start>=end){ showToast("Check the dates — start must be before end"); return; }
    state.fiscalYear = { startDate:start, endDate:end };
    saveState(); showToast("Financial year updated"); render();
  };
  fyCard.appendChild(fySaveBtn);
  wrap.appendChild(fyCard);

  const balCard = el(`<div class="card" style="max-width:560px; margin-bottom:20px;"></div>`);
  balCard.appendChild(el(`<div class="section-title">Opening balances<div class="rule"></div></div>`));
  balCard.appendChild(el(`<p class="section-sub">The balance brought forward at the start of the current financial year. Updated automatically when you close a year.</p>`));
  const balForm = el(`<div class="form-grid" style="grid-template-columns:1fr 1fr;">
    <div class="field"><label>Admin account (R)</label><input type="number" step="0.01" id="s-admin" value="${state.openingBalances.Admin}"></div>
    <div class="field"><label>Projects account (R)</label><input type="number" step="0.01" id="s-projects" value="${state.openingBalances.Projects}"></div>
  </div>`);
  balCard.appendChild(balForm);
  const balSaveBtn = el(`<button class="btn" style="margin-top:14px;">Save opening balances</button>`);
  balSaveBtn.onclick = ()=>{
    state.openingBalances.Admin = parseFloat(balForm.querySelector('#s-admin').value)||0;
    state.openingBalances.Projects = parseFloat(balForm.querySelector('#s-projects').value)||0;
    saveState(); showToast("Opening balances saved"); render();
  };
  balCard.appendChild(balSaveBtn);
  wrap.appendChild(balCard);

  const dangerCard = el(`<div class="card" style="max-width:560px;"></div>`);
  dangerCard.appendChild(el(`<div class="section-title">Data<div class="rule"></div></div>`));
  dangerCard.appendChild(el(`<p class="section-sub">Your ledger, dues, and closed-year history are saved automatically and privately to your account.</p>`));
  const resetBtn = el(`<button class="btn danger">Clear all current-year transactions</button>`);
  const resetArea = el(`<div></div>`);
  resetArea.appendChild(resetBtn);
  resetBtn.onclick = ()=>{
    const confirmBox = el(`<div class="confirm-box">
      <span>This permanently deletes every transaction in the current, open ledger (closed years are unaffected).</span>
      <div class="actions"><button class="btn danger small">Yes, clear it</button><button class="btn ghost small">Cancel</button></div>
    </div>`);
    const [yesBtn, cancelBtn] = confirmBox.querySelectorAll('button');
    yesBtn.onclick = ()=>{ state.transactions = []; saveState(); showToast("Current-year transactions cleared"); render(); };
    cancelBtn.onclick = ()=> confirmBox.remove();
    resetArea.appendChild(confirmBox);
  };
  dangerCard.appendChild(resetArea);

  const resetDuesBtn = el(`<button class="btn danger" style="margin-top:12px;">Reset all member balances to R0.00</button>`);
  const resetDuesArea = el(`<div style="margin-top:12px;"></div>`);
  resetDuesArea.appendChild(resetDuesBtn);
  resetDuesBtn.onclick = ()=>{
    const confirmBox = el(`<div class="confirm-box">
      <span>This sets every member's balance owing back to R0.00 and clears their charge/payment history. Members themselves are not removed.</span>
      <div class="actions"><button class="btn danger small">Yes, reset balances</button><button class="btn ghost small">Cancel</button></div>
    </div>`);
    const [yesBtn, cancelBtn] = confirmBox.querySelectorAll('button');
    yesBtn.onclick = ()=>{
      state.dues.forEach(m=>{ m.owing = 0; m.history = []; });
      saveState(); showToast("All member balances reset to R0.00"); render();
    };
    cancelBtn.onclick = ()=> confirmBox.remove();
    resetDuesArea.appendChild(confirmBox);
  };
  dangerCard.appendChild(resetDuesArea);
  wrap.appendChild(dangerCard);

  return wrap;
}

/* ---------- boot ---------- */
(async function boot(){
  if(useSupabase && sb){
    try{
      const { data } = await withTimeout(sb.auth.getSession(), 8000);
      authSession = data?.session || null;
    }catch(e){ console.error("Couldn't check login status:", e); }
    sb.auth.onAuthStateChange((_event, session)=>{
      const wasSignedIn = !!authSession;
      authSession = session;
      if(!wasSignedIn && session){ loadState().then(render); }
      else if(wasSignedIn && !session){ render(); }
    });
  }
  if(!useSupabase || authSession){
    try{ await loadState(); }
    catch(e){ console.error("Unexpected error during startup:", e); }
  }
  render();
})();
</script>
</body>
</html>
